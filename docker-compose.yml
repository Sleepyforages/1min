services:
  bot:
    build: .
    image: polymarket-hedge-bot:latest
    container_name: polymarket-hedge-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "1.0"
