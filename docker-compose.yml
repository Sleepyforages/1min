services:
  bot:
    build: .
    image: polymarket-hedge-bot:latest
    container_name: polymarket-hedge-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - HTTPS_PROXY=socks5h://172.17.0.1:9050
      - HTTP_PROXY=socks5h://172.17.0.1:9050
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "1.0"
