# ── EXPERIMENT: Pure Mean Reversion (2026-03-16) ───────────────────────────────
# All filters and addons disabled. Signal inverted (bet against current bar).
# Pre-market GTC orders on next window at fixed $0.51 price.
# Assets: SOL, DOGE only (testing phase).

mode: live
interval: 5m
assets:
  - sol
  - doge
experiment: experiment_1   # experiment_1 | experiment_2 | experiment_3 | off

# ── Bet Sizing ─────────────────────────────────────────────────────────────────
base_bet_usd: 1.0
entry_price: 0.51            # Fixed entry price ($0.51 GTC pre-market)
invert_signal: true          # Mean reversion: bet AGAINST current bar direction

# ── Progression ────────────────────────────────────────────────────────────────
progression_type: fixed
progression_cap: 7

# ── All addons OFF ─────────────────────────────────────────────────────────────
use_hedge: false
rsi_filter_enabled: false
h1_filter_enabled: false
kelly_sizing_enabled: false
us_hours_multiplier: 1.0     # No multiplier
weekend_behavior: off        # Trade always

# ── Inactive settings (kept for reference) ─────────────────────────────────────
hedge_sell_trigger_minutes: 2.5
hedge_sell_price_trigger: 0.20
us_hours_start_utc: 14
us_hours_end_utc: 20
rsi_period: 14
rsi_overextended_low: 45
rsi_overextended_high: 55
h1_body_threshold: 0.003
h1_bias_duration_trades: 12
h1_force_progression: martingale
kelly_fraction: 0.5
kelly_bankroll_usd: 100.0
kelly_estimated_edge: 0.04
kelly_max_bet_pct: 5.0

# ── Alerts / Ops ───────────────────────────────────────────────────────────────
telegram_alerts_enabled: false
telegram_alert_on_win: false
telegram_alert_on_loss: true
telegram_drawdown_alert_pct: 5.0
parallel_assets: true
dry_run: false
max_daily_loss_pct: 10
log_level: INFO
